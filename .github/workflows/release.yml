name: Windows Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag, for example v1.4.7'
        required: true
        default: v1.4.7

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    timeout-minutes: 90
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Verify release version
        shell: pwsh
        run: |
          $version = (Get-Content frontend/package.json -Raw | ConvertFrom-Json).version
          if ($env:RELEASE_TAG -ne "v$version") {
            throw "Release tag $env:RELEASE_TAG does not match package version v$version."
          }

      - name: Reject bundled font files
        shell: pwsh
        run: |
          $fontFiles = @(git ls-files | Where-Object {
            [IO.Path]::GetExtension($_) -match '^\.(ttf|otf|ttc)$'
          })
          if ($fontFiles) {
            throw "Public source must not contain bundled font files: $($fontFiles -join ', ')"
          }

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install -r backend/requirements.txt
          npm ci --prefix frontend

      - name: Build Windows installers
        shell: pwsh
        run: npm --prefix frontend run package:win

      - name: Create portable ZIPs and checksums
        shell: pwsh
        run: |
          $release = Join-Path $PWD 'frontend/release'
          $version = (Get-Content frontend/package.json -Raw | ConvertFrom-Json).version
          foreach ($mode in @('offline', 'online')) {
            $dir = Join-Path $release "$mode-windows"
            $unpacked = Join-Path $dir 'win-unpacked'
            if (-not (Test-Path $unpacked)) { throw "Missing $unpacked" }
            $zip = Join-Path $dir "official-document-ai-assistant-$mode-$version-x64.zip"
            Compress-Archive -Path (Join-Path $unpacked '*') -DestinationPath $zip -Force
          }
          $assets = Get-ChildItem $release -Directory -Filter '*-windows' |
            ForEach-Object { Get-ChildItem $_.FullName -File } |
            Where-Object { $_.Extension -in @('.exe', '.msi', '.zip') }
          if ($assets.Count -lt 6) { throw 'Expected offline/online EXE, MSI, and ZIP assets.' }
          $lines = $assets | Sort-Object FullName | ForEach-Object {
            "$(Get-FileHash $_.FullName -Algorithm SHA256 | Select-Object -ExpandProperty Hash)  $($_.Name)"
          }
          $lines | Set-Content -Encoding ascii (Join-Path $release 'SHA256SUMS.txt')

      - name: Verify package metadata
        shell: pwsh
        run: npm --prefix frontend run verify:packages -- --skip-debian

      - name: Publish GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $release = Join-Path $PWD 'frontend/release'
          $assets = Get-ChildItem $release -Directory -Filter '*-windows' |
            ForEach-Object { Get-ChildItem $_.FullName -File } |
            Where-Object { $_.Extension -in @('.exe', '.msi', '.zip') }
          $assets += Get-Item (Join-Path $release 'SHA256SUMS.txt')
          gh release create $env:RELEASE_TAG $assets.FullName --repo NextWeb4/official-document-ai-assistant --title "Initial Clean Release $env:RELEASE_TAG" --notes-file RELEASE_NOTES.md
